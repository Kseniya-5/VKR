version: "3.9"

services:
  telegram-bot:
    build: .
    container_name: tg-bot
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - REDIS_URL=redis://redis:6379
    ports:
      - "8081:8080"
    volumes:
      - ./data:/app/data
    networks:
      - network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis-data:

networks:
  network:
    driver: bridge
