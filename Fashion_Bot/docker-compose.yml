services:
  # Nginx (Reverse Proxy + отдача статики)
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static-data:/app/static
    depends_on:
      - telegram-bot
    networks:
      - network

  # 1. Telegram-бот (отправляет задачи в очередь / веб-сервер)
  telegram-bot:
    build: .
    container_name: tg-bot
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEBUG=False
    expose:
      - "8080"
    volumes:
      - ./data:/app/data
      - static-data:/app/static
    networks:
      - network

  # 2. Воркер для обработки долгих задач (обучение/инференс)
  worker:
    build: .
    container_name: tg-worker
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    command: ["celery", "-A", "tasks", "worker", "--loglevel=info"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - network

  # 3. Брокер сообщений для Celery
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 4. База данных для сохранения статусов обучения моделей
  db:
    image: postgres:15-alpine
    container_name: fashion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis-data:
  pg-data:
  static-data:

networks:
  network:
    driver: bridge
