apiVersion: apps/v1
kind: Deployment
metadata:
  name: fashion-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fashion-api
  template:
    metadata:
      labels:
        app: fashion-api
    spec:
      containers:
        - name: fashion-api
          image: fashion-bot:v2
          imagePullPolicy: Never
          command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fashion-config
            - secretRef:
                name: fashion-secrets
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            timeoutSeconds: 3
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: media
              mountPath: /app/media
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: fashion-api-service
spec:
  type: ClusterIP
  selector:
    app: fashion-api
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
