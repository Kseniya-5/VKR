apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
    spec:
      containers:
        - name: telegram-bot
          image: fashion-bot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.bot.main"]
          envFrom:
            - configMapRef:
                name: fashion-config
            - secretRef:
                name: fashion-secrets
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - containerPort: 8080    