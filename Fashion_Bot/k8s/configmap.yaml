apiVersion: v1
kind: ConfigMap
metadata:
  name: fashion-config
data:
  DATABASE_URL: "postgresql+asyncpg://fashion_user:fashion_password@postgres-service:5432/fashion_db"
  PUBLIC_BASE_URL: "https://speech-nest-output-legs.trycloudflare.com"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        upstream api {
            server fashion-api-service:8000;
        }

        server {
            listen 80;
            server_name _;

            # Статика (HTML-страницы)
            location / {
                root /usr/share/nginx/html;
                try_files $uri $uri/ @backend;
            }

            # API и все остальные запросы — проксируем на backend
            location @backend {
                proxy_pass http://api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Явно проксируем /auth, /users, /photos, /docs на backend
            location ~ ^/(auth|users|photos|docs|openapi.json) {
                proxy_pass http://api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Медиа-файлы (фото)
            location /media/ {
                alias /media/;
                autoindex off;
                add_header Cache-Control "public, max-age=3600";
            }

            # Здоровье
            location /health {
                return 200 "OK";
                add_header Content-Type text/plain;
            }
        }
    }

  from-telegram.html: |
    <!-- 
      Файл: from-telegram.html
      Описание: Регистрация веб-аккаунта через ссылку из Telegram
      Разработано с помощью: Perplexity AI (модель Claude Sonnet 4.5)
      Шаблон: AdminLTE 3 (https://adminlte.io)
    -->
    <!DOCTYPE html>
    <html lang="ru">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Fashion Bot | Регистрация через Telegram</title>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
      <style>
        .register-page {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
          border-radius: 15px;
          box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
      </style>
    </head>
    <body class="hold-transition register-page">
    <div class="register-box">
      <div class="card card-outline card-primary">
        <div class="card-header text-center">
          <h1><b>Fashion</b>Bot</h1>
          <p class="text-muted"><i class="fab fa-telegram mr-2"></i>Регистрация через Telegram</p>
        </div>
        <div class="card-body">
          <p class="login-box-msg">Создайте веб-аккаунт для доступа к полной версии</p>
          <form id="register-form">
            <div class="input-group mb-3">
              <input type="email" class="form-control" id="email" placeholder="Email" required>
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-envelope"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <input type="password" class="form-control" id="password" placeholder="Пароль (минимум 8 символов)" minlength="8" required>
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-lock"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <input type="password" class="form-control" id="password-confirm" placeholder="Подтвердите пароль" minlength="8" required>
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-lock"></span>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-12">
                <button type="submit" class="btn btn-primary btn-block">
                  <i class="fas fa-user-plus mr-2"></i>Создать веб-аккаунт
                </button>
              </div>
            </div>
          </form>
          <div id="message" class="mt-3"></div>
          <hr>
          <p class="text-center text-muted small">
            После регистрации вы сможете входить как через веб-версию, так и через Telegram-бота
          </p>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script>
      const API_BASE_URL = window.location.origin;
      function getTokenFromQuery() {
        const params = new URLSearchParams(window.location.search);
        return params.get('token');
      }
      const token = getTokenFromQuery();
      const messageEl = document.getElementById('message');
      if (!token) {
        messageEl.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>Токен не найден в ссылке. Перейдите по ссылке из Telegram ещё раз.</div>';
        document.getElementById('register-form').style.display = 'none';
      }
      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('password-confirm').value;
        if (password !== passwordConfirm) {
          messageEl.innerHTML = '<div class="alert alert-warning"><i class="fas fa-exclamation-circle mr-2"></i>Пароли не совпадают</div>';
          return;
        }
        messageEl.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin mr-2"></i>Создание аккаунта...</div>';
        try {
          const response = await fetch(`${API_BASE_URL}/auth/register-from-telegram`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ email, password })
          });
          const data = await response.json();
          if (!response.ok) {
            if (response.status === 401) {
              messageEl.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>Токен недействителен или истёк. Сгенерируйте новую ссылку в боте.</div>';
            } else if (response.status === 409) {
              messageEl.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>${data.detail || 'Пользователь с таким email уже существует'}</div>`;
            } else {
              messageEl.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>${data.detail || 'Произошла ошибка'}</div>`;
            }
            return;
          }
          messageEl.innerHTML = `
            <div class="alert alert-success">
              <i class="fas fa-check-circle mr-2"></i>
              <strong>Аккаунт успешно создан!</strong><br>
              <small>Теперь вы можете войти с email: <strong>${email}</strong></small>
            </div>
          `;
          document.getElementById('register-form').style.display = 'none';
          setTimeout(() => {
            window.location.href = '/';
          }, 3000);
        } catch (err) {
          console.error(err);
          messageEl.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>Не удалось связаться с сервером. Попробуйте позже.</div>';
        }
      });
    </script>
    </body>
    </html>

  view-photos.html: |
    <!DOCTYPE html>
    <html lang="ru">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Мои фото — Fashion Bot</title>
      <style>
        body {
          font-family: system-ui, -apple-system, sans-serif;
          max-width: 900px;
          margin: 40px auto;
          padding: 0 16px;
          background: #f5f5f5;
        }
        h1 {
          font-size: 28px;
          color: #333;
        }
        .auth-block {
          background: #fff;
          padding: 24px;
          border-radius: 8px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
          margin-bottom: 24px;
        }
        .auth-block label {
          display: block;
          margin-bottom: 8px;
          font-weight: 500;
        }
        .auth-block input {
          width: 100%;
          padding: 10px;
          border: 1px solid #ddd;
          border-radius: 4px;
          box-sizing: border-box;
        }
        .auth-block button {
          margin-top: 12px;
          padding: 10px 20px;
          background: #007bff;
          color: #fff;
          border: none;
          border-radius: 4px;
          cursor: pointer;
        }
        .auth-block button:hover {
          background: #0056b3;
        }
        .error {
          color: #c00;
          margin-top: 12px;
        }
        .success {
          color: #090;
          margin-top: 12px;
        }
        .photos-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
          gap: 16px;
          margin-top: 24px;
        }
        .photo-card {
          background: #fff;
          border-radius: 8px;
          overflow: hidden;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .photo-card img {
          width: 100%;
          height: 200px;
          object-fit: cover;
          display: block;
        }
        .photo-card .info {
          padding: 12px;
          font-size: 13px;
          color: #666;
        }
        .loading {
          text-align: center;
          padding: 40px;
          color: #666;
        }
      </style>
    </head>
    <body>
      <h1>🖼 Мои фото</h1>
      <div id="auth-block" class="auth-block" style="display:none;">
        <p>Чтобы просмотреть фото, получите ссылку для входа в боте (кнопка «🔗 Веб-версия» → «🔑 Сгенерировать ссылку»).</p>
        <label>
          Или введите токен вручную:
          <input type="text" id="manual-token" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." />
        </label>
        <button onclick="loadPhotosWithManualToken()">Загрузить фото</button>
        <div id="auth-message"></div>
      </div>
      <div id="photos-container"></div>
      <script>
        const apiBaseUrl = window.location.origin;
        let accessToken = null;
        function getTokenFromQuery() {
          const params = new URLSearchParams(window.location.search);
          return params.get("token");
        }
        async function loadPhotos(token) {
          const container = document.getElementById("photos-container");
          container.innerHTML = '<div class="loading">Загрузка...</div>';
          try {
            const response = await fetch(apiBaseUrl + "/photos?page=1&page_size=50", {
              method: "GET",
              headers: {
                "Authorization": "Bearer " + token,
              },
            });
            if (!response.ok) {
              if (response.status === 401) {
                container.innerHTML = '<div class="error">Токен недействителен или истёк. Получите новую ссылку в боте.</div>';
                document.getElementById("auth-block").style.display = "block";
                return;
              }
              throw new Error("HTTP " + response.status);
            }
            const data = await response.json();
            const total = data.total || 0;
            const items = data.items || [];
            if (total === 0) {
              container.innerHTML = '<div class="loading">У вас пока нет загруженных фото.</div>';
              return;
            }
            let html = `<p><strong>Всего фото:</strong> ${total}</p><div class="photos-grid">`;
            for (const item of items) {
              const createdAt = item.created_at ? new Date(item.created_at).toLocaleString("ru-RU") : "—";
              const imgSrc = item.url || "https://via.placeholder.com/200x200?text=No+Image";
              html += `
                <div class="photo-card">
                  <img src="${imgSrc}" alt="Фото ${item.id}" />
                  <div class="info">
                    <div>ID: ${item.id.substring(0, 8)}...</div>
                    <div>Дата: ${createdAt}</div>
                  </div>
                </div>
              `;
            }
            html += '</div>';
            container.innerHTML = html;
          } catch (err) {
            console.error(err);
            container.innerHTML = '<div class="error">Не удалось загрузить фото. Проверьте подключение к серверу.</div>';
          }
        }
        function loadPhotosWithManualToken() {
          const token = document.getElementById("manual-token").value.trim();
          const messageEl = document.getElementById("auth-message");
          messageEl.textContent = "";
          messageEl.className = "";
          if (!token) {
            messageEl.textContent = "Введите токен.";
            messageEl.className = "error";
            return;
          }
          accessToken = token;
          document.getElementById("auth-block").style.display = "none";
          loadPhotos(token);
        }
        window.addEventListener("DOMContentLoaded", () => {
          const token = getTokenFromQuery();
          if (token) {
            accessToken = token;
            loadPhotos(token);
          } else {
            document.getElementById("auth-block").style.display = "block";
            document.getElementById("photos-container").innerHTML = "";
          }
        });
      </script>
    </body>
    </html>