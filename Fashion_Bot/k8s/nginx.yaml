apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-conf-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-html-volume
              mountPath: /usr/share/nginx/html/from-telegram.html
              subPath: from-telegram.html
              readOnly: true
            - name: auth-volume
              mountPath: /etc/nginx/conf.d/auth
              subPath: auth
              readOnly: true
            - name: media
              mountPath: /usr/share/nginx/media
      volumes:
        - name: nginx-conf-volume
          configMap:
            name: nginx-config
        - name: nginx-html-volume
          configMap:
            name: nginx-config
        - name: auth-volume
          secret:
            secretName: nginx-basic-auth
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80