apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: worker
          image: ghcr.io/kseniya-5/fashion-bot:v1
          imagePullPolicy: Always
          command: ["celery", "-A", "tasks", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: fashion-config
            - secretRef:
                name: fashion-secrets