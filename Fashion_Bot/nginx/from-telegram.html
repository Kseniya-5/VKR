<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fashion Bot | Регистрация через Telegram</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  
  <style>
    .register-page {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card {
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body class="hold-transition register-page">
<div class="register-box">
  <div class="card card-outline card-primary">
    <div class="card-header text-center">
      <h1><b>Fashion</b>Bot</h1>
      <p class="text-muted"><i class="fab fa-telegram mr-2"></i>Регистрация через Telegram</p>
    </div>
    <div class="card-body">
      <p class="login-box-msg">Создайте веб-аккаунт для доступа к полной версии</p>

      <form id="register-form">
        <div class="input-group mb-3">
          <input type="email" class="form-control" id="email" placeholder="Email" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-envelope"></span>
            </div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" class="form-control" id="password" placeholder="Пароль (минимум 8 символов)" minlength="8" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" class="form-control" id="password-confirm" placeholder="Подтвердите пароль" minlength="8" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        
        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">
              <i class="fas fa-user-plus mr-2"></i>Создать веб-аккаунт
            </button>
          </div>
        </div>
      </form>

      <div id="message" class="mt-3"></div>

      <hr>
      <p class="text-center text-muted small">
        После регистрации вы сможете входить как через веб-версию, так и через Telegram-бота
      </p>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script type="module">
  import { setAccessToken, fetchCurrentUser } from './assets/js/app.js';

  const API_BASE_URL = `${window.location.origin}/api`;

  function getTokenFromQuery() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
  }

  const token = getTokenFromQuery();
  const messageEl = document.getElementById('message');

  if (!token) {
    messageEl.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>Токен не найден в ссылке. Перейдите по ссылке из Telegram ещё раз.</div>';
    document.getElementById('register-form').style.display = 'none';
  }

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('password-confirm').value;

    if (password !== passwordConfirm) {
      messageEl.innerHTML = '<div class="alert alert-warning"><i class="fas fa-exclamation-circle mr-2"></i>Пароли не совпадают</div>';
      return;
    }

    messageEl.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin mr-2"></i>Создание аккаунта...</div>';

    try {
      const response = await fetch(`${API_BASE_URL}/auth/register-from-telegram`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
        body: JSON.stringify({ email, password }),
      });

      const data = await response.json();

      if (!response.ok) {
        if (response.status === 401) {
          messageEl.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>Токен недействителен или истёк. Сгенерируйте новую ссылку в боте.</div>';
        } else if (response.status === 409) {
          messageEl.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>${data.detail || 'Пользователь с таким email уже существует'}</div>`;
        } else {
          messageEl.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>${data.detail || 'Произошла ошибка'}</div>`;
        }
        return;
      }

      // Считаем, что этот токен — рабочий access token, кладём его в localStorage
      setAccessToken(token);

      // Проверяем, что токен действительно валидный
      const me = await fetchCurrentUser();
      if (!me || !me.id) {
        messageEl.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>Не удалось получить профиль пользователя. Попробуйте войти через главную страницу.</div>';
        setAccessToken(null);
        return;
      }

      messageEl.innerHTML = `
        <div class="alert alert-success">
          <i class="fas fa-check-circle mr-2"></i>
          <strong>Аккаунт успешно создан!</strong><br>
          <small>Сейчас откроется веб-профиль.</small>
        </div>
      `;

      document.getElementById('register-form').style.display = 'none';

      setTimeout(() => {
        window.location.href = '/dashboard';
      }, 1500);

    } catch (err) {
      console.error(err);
      messageEl.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle mr-2"></i>Не удалось связаться с сервером. Попробуйте позже.</div>';
    }
  });
</script>

</body>
</html>
