events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    client_max_body_size 20M;

    upstream backend_api {
        server fashion-api-service:8000;
    }

    server {
        listen 80;
        server_name _;

        # Canonical API path for browser. /api/photos -> backend /photos
        location /api/ {
            proxy_pass http://backend_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Docs and health aliases
        location = /docs { proxy_pass http://backend_api/docs; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /docs/ { proxy_pass http://backend_api/docs/; proxy_http_version 1.1; proxy_set_header Host $host; }
        location = /redoc { proxy_pass http://backend_api/redoc; proxy_http_version 1.1; proxy_set_header Host $host; }
        location = /openapi.json { proxy_pass http://backend_api/openapi.json; proxy_http_version 1.1; proxy_set_header Host $host; }
        location = /health { proxy_pass http://backend_api/health; proxy_http_version 1.1; proxy_set_header Host $host; }

        # Backward-compatible direct API routes. Keep them for bot links/debug, but web uses /api/*.
        location /auth/ { proxy_pass http://backend_api; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /users/ { proxy_pass http://backend_api; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /photos/ { proxy_pass http://backend_api; proxy_http_version 1.1; proxy_set_header Host $host; }

        # Extensionless frontend pages
        location = / { root /usr/share/nginx/html; try_files /index.html =404; }
        location = /dashboard { root /usr/share/nginx/html; try_files /dashboard.html =404; }
        location = /photos { root /usr/share/nginx/html; try_files /photos.html =404; }
        location = /profile { root /usr/share/nginx/html; try_files /profile.html =404; }
        location = /settings { root /usr/share/nginx/html; try_files /settings.html =404; }
        location = /link-telegram { root /usr/share/nginx/html; try_files /link-telegram.html =404; }
        location = /from-telegram { root /usr/share/nginx/html; try_files /from-telegram.html =404; }
        location = /link-existing-web { root /usr/share/nginx/html; try_files /link-existing-web.html =404; }
        location = /login-token { root /usr/share/nginx/html; try_files /login-token.html =404; }
        location = /recommendations { root /usr/share/nginx/html; try_files /recommendations.html =404; }
        location = /outfits { root /usr/share/nginx/html; try_files /outfits.html =404; }

        location /assets/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
